# scripts/nginx.conf
# Patent Search reverse proxy: 80 -> Next.js (3000)
# Deployed to D:\nginx\conf\conf.d\patent.conf by nginx-start.ps1
#
# NOTE: Project lives at "D:\Claude Code Files\..." (contains a space).
# nginx on Windows can't handle spaces in log paths, so we use the
# no-space junction "D:\patent" created by nginx-start.ps1.
# Also avoids PowerShell $VAR expansion: nginx vars are written as
# placeholders and patched in the script.

server {
    listen       80;
    server_name  _;

    access_log   D:/patent/logs/nginx-access.log;
    error_log    D:/patent/logs/nginx-error.log warn;

    client_max_body_size 50m;

    # Static assets: Next.js compiled output, cached long
    location /_next/static {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              __HOST__;
        expires            365d;
        add_header         Cache-Control "public, immutable";
    }

    location = /favicon.ico {
        proxy_pass http://127.0.0.1:3000;
        access_log off;
    }

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              __HOST__;
        proxy_set_header   X-Real-IP         __REMOTE_ADDR__;
        proxy_set_header   X-Forwarded-For   __PROXY_ADD_X_FORWARDED_FOR__;
        proxy_set_header   X-Forwarded-Proto __SCHEME__;
        proxy_set_header   Upgrade           __HTTP_UPGRADE__;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}